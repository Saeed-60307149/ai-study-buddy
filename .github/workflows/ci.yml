name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install flake8
          flake8 app.py --max-line-length=100 --ignore=E501,W503

      - name: Run unit tests
        run: |
          pip install pytest mongomock
          pytest tests/ -v

      - name: Build Docker image
        run: docker build -t cipher974/ai-study-buddy .

      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 \
            -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --name test-container cipher974/ai-study-buddy
          sleep 10
          docker logs test-container
          curl --fail http://localhost:5000/health
          docker stop test-container
          docker rm test-container

  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: cipher974/ai-study-buddy:latest

      - name: Trigger Render deployment
        run: |
          curl --fail "${{ secrets.RENDER_DEPLOY_URL }}"
          echo "Deployment triggered successfully"